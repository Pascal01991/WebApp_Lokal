<script>document.addEventListener('DOMContentLoaded', function () {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        events: function(fetchInfo, successCallback, failureCallback) {
            // Hier die Events aus dem Google Kalender holen
            gapi.load('client:auth2', function () {
                gapi.client.init({
                    apiKey: 'DEIN_API_KEY',
                    clientId: 'DEIN_CLIENT_ID',
                    discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],
                    scope: 'https://www.googleapis.com/auth/calendar.readonly'
                }).then(function () {
                    gapi.client.calendar.events.list({
                        'calendarId': 'primary',
                        'timeMin': new Date().toISOString(),
                        'showDeleted': false,
                        'singleEvents': true,
                        'maxResults': 10,
                        'orderBy': 'startTime'
                    }).then(function (response) {
                        var events = response.result.items.map(event => {
                            return {
                                title: event.summary,
                                start: event.start.dateTime || event.start.date,
                                end: event.end.dateTime || event.end.date
                            };
                        });
                        successCallback(events);
                    });
                });
            });
        }
    });
    calendar.render();
});

app.get('/check-availability', (req, res) => {
    const { startTime, endTime } = req.query;

    calendar.freebusy.query({
        auth: oauth2Client,
        resource: {
            timeMin: startTime,
            timeMax: endTime,
            timeZone: 'Europe/Berlin',
            items: [{ id: 'primary' }],
        },
    }, (err, response) => {
        if (err) {
            console.log('Free Busy Query Error: ', err);
            return res.status(500).send('Error checking availability');
        }

        const eventsArray = response.data.calendars.primary.busy;
        if (eventsArray.length === 0) {
            res.send('Slot verfügbar');
        } else {
            res.send('Slot nicht verfügbar');
        }
    });
});
